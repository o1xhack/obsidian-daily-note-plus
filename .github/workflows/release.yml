name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          test "$(node -p "require('./package.json').version")" = "$RELEASE_VERSION"
          test "$(node -p "require('./manifest.json').version")" = "$RELEASE_VERSION"

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --verify-tag --generate-notes --latest
          fi
